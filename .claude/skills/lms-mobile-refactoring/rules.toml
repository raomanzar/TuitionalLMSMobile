# Companion asset for the `lms-mobile-refactoring` skill.
# Hard rules for refactoring + cleanup work in the Tuitional LMS Mobile app.
# Last updated: 2026-05-04

[scope]
covers = [
  "forward-scaffolding stub modules to canonical pattern",
  "layer-skip detection (axios in components, inline query keys, any in helpers)",
  "type tightening (any → src/types/<module>.types.ts)",
  "ScrollView → FlatList migration when content is server-driven",
  "dead-code detection (ts-prune, surface only)",
  "naming convention enforcement",
  "import-boundary cleanup",
  "delete-don't-deprecate hygiene (matches CLAUDE.md)",
]

defers_to = [
  { topic = "what shape to scaffold to (file order, naming)", skill = "lms-mobile-api-integration" },
  { topic = "route layout for the new module", skill = "lms-mobile-platform" },
  { topic = "FlatList tuning numbers", skill = "lms-mobile-performance" },
  { topic = "audit posture during UI review", skill = "lms-mobile-ui-testing" },
  { topic = "design tokens / styling", skill = "lms-mobile-ui-pipeline" },
]

# ─────────────────────────────────────────────
# POSTURE
# ─────────────────────────────────────────────

[posture]
mode_primary   = "forward-scaffolding (stubs → canonical)"
mode_secondary = "pattern-drift correction"
mode_forbidden = "legacy refactor (premature for this codebase)"

[posture.canonical_module]
name = "users"
files = [
  "src/services/apis/users/",
  "src/hooks/modules/users/",
  "src/components/ui/users/",
  "src/app/(protected)/users.tsx",
  "src/app/users/",
]
modify_without_approval = false

[posture.stub_modules]
list = ["auth", "enrollments", "schedule", "billing", "chat"]
target_shape = "match `users` exactly"

# ─────────────────────────────────────────────
# LAYER-SKIP GREP RECIPES — owned elsewhere
# ─────────────────────────────────────────────

[grep]
# Canonical greps live in:
#   - lms-mobile-api-integration/rules.toml [validate]  (axios in components, inline query keys,
#                                                       any in helpers, BASE_URL concat,
#                                                       React in mappers, raw axios/fetch in screens)
#   - lms-mobile-ui-pipeline/rules.toml      [validate]  (hex colors, rgba, bare font sizes)
#   - lms-mobile-platform/rules.toml         [validate]  (relative deep paths)
# This skill DOES NOT redefine recipes — load the canonical owners and run them.

owned_by = [
  "lms-mobile-api-integration ([validate]) — layer-skip recipes",
  "lms-mobile-ui-pipeline ([validate]) — token-discipline recipes",
  "lms-mobile-platform ([validate]) — relative-deep-path recipe",
]
bundle_into_script = "scripts/audit-layer-skips.sh"
add_new_recipe_to = "the canonical owner above — never duplicate here"

# ─────────────────────────────────────────────
# TYPE TIGHTENING
# ─────────────────────────────────────────────

[types]
no_any_in = ["src/services/apis/*/endpoint.ts", "src/services/apis/*/helpers.ts"]
no_unknown_as_workaround = true
create_missing_types_first = "src/types/<module>.types.ts"
follow_naming = "{Resource}_Api_Payload_Type / {Resource}_Api_Response_Type / {Resource}_Object_Type"

# ─────────────────────────────────────────────
# SCROLLVIEW → FLATLIST MIGRATION TRIGGER
# ─────────────────────────────────────────────

[migration.scrollview_to_flatlist]
trigger = "ScrollView rendering .map() over server-driven data"
required_props_after = [
  "keyExtractor (module-level)",
  "renderItem (useCallback)",
  "removeClippedSubviews",
  "initialNumToRender",
  "refreshing + onRefresh wired to TanStack Query refetch",
]
forbidden = "FlatList nested in ScrollView"
header_pattern = "ListHeaderComponent for fixed content above the list"
defer_tuning_numbers_to = "lms-mobile-performance §2.2"

# ─────────────────────────────────────────────
# DEAD-CODE DETECTION
# ─────────────────────────────────────────────

[dead_code]
tools = ["ts-prune", "knip"]
ci_step = "npx ts-prune --error"
auto_delete = false                             # surface only; user decides
flag_files_unchanged_since = "initial scaffold commit"

# ─────────────────────────────────────────────
# NAMING CONVENTIONS (cross-skill summary)
# ─────────────────────────────────────────────

[naming]
component_file = "PascalCase.tsx"
route_file     = "kebab-case.tsx"
hook_file      = "camelCase.ts (use prefix)"
url_builder    = "{verb}{Resource}Api"
service_fn     = "{verb}{Resource}"
type_alias     = "{Resource}_Api_Payload_Type / _Response_Type / _Object_Type"

# ─────────────────────────────────────────────
# DELETE-DON'T-DEPRECATE
# ─────────────────────────────────────────────

[delete_dont_deprecate]
forbidden_patterns = [
  "_unused* prefix on dead identifier",
  "// removed for X comments",
  "re-exporting removed types from a barrel",
  "feature flags for code that is truly gone",
]
when_changing_public_shape = "update every consumer in the same change"

# ─────────────────────────────────────────────
# REFACTOR CHECKLIST PER MODULE
# ─────────────────────────────────────────────

[checklist]
# File-creation ORDER is owned by lms-mobile-platform §1 (canonical bootstrap).
# This skill's checklist is the *refactor* order, which references that bootstrap as one step.
order = [
  "diff file tree against users/",
  "bootstrap missing files in fixed order — defer to lms-mobile-platform §1",
  "replace every `any` with proper type",
  "migrate ScrollView over server data to FlatList",
  "run layer-skip + token-discipline greps — defer to api-integration / ui-pipeline [validate]",
  "verify import boundaries",
  "verify naming conventions",
  "ts-prune for dead code",
  "npx tsc --noEmit && npm run lint",
  "spot-check on device — defer to lms-mobile-ui-testing",
]

# ─────────────────────────────────────────────
# RULES
# ─────────────────────────────────────────────

[rules]
never_modify_users_module_without_approval = true
one_module_per_pr = true
forward_scaffolding_first = true
grep_recipes_fail_closed = true

[permission]
require_explicit_approval_to_modify_canonical_users = true
require_explicit_approval_to_modify_theme_tokens   = true
require_explicit_approval_to_change_query_key_factory = true
never_push_to_main = true
run_validation_after_change = true
